# =============================================================================
# MANOE judge DISCRIMINATION golden pairs (the REAL faithful-vs-unfaithful gate)
# =============================================================================
# This is where the LLM judge's discrimination is honestly tested — against a
# REAL model (promptfoo's grader), NOT a stub. (A stubbed-LLM jest test cannot
# verify discrimination; that lives in EvaluationPromptAssembly.test.ts as
# prompt-ASSEMBLY only — see ../../src/__tests__/EvaluationPromptAssembly.test.ts.)
#
# Each PAIR shares an architect plan. One member is a writer passage that
# FAITHFULLY follows the plan; the other DELIBERATELY violates it. The rubric
# embeds the passage and the plan and asks the judge to decide faithfulness, so
# the passage is deterministic and only the JUDGE is the model under evaluation.
#
# The vars still fill the Writer prompt (a generation happens), but the assertion
# is self-contained — it grades the embedded passage, not the generated text.
# =============================================================================

# ---- PAIR A: plan demands a tragic ending; writer obeys ---------------------
- _id: faithful-tragic-ending
  vars:
    sceneNum: 7
    sceneTitle: "The Last Letter"
    wordCount: 400
    sceneOutline: '{"beat":"placeholder","hook":"placeholder"}'
    keyConstraints: "(discrimination case — see assertion)"
  assert:
    - type: llm-rubric
      value: >
        You are judging FAITHFULNESS of a writer passage to an architect plan.

        ARCHITECT PLAN: The scene must end TRAGICALLY — Elena reads the letter,
        learns her brother died at sea, and is left alone in grief. No rescue,
        no hopeful reversal.

        WRITER PASSAGE: "Elena's hands shook as she unfolded the page. The ink had
        run, but the words held: the Maris went down off the Skaw, all hands lost.
        She read his name three times before it stopped being a name and became a
        fact. The fire had burned to embers. She did not stir to feed it."

        PASS if and only if the passage FAITHFULLY follows the plan (tragic,
        brother dead, Elena alone, no hopeful reversal). Output PASS/FAIL with
        one sentence of reasoning.

- _id: unfaithful-tragic-ending
  vars:
    sceneNum: 7
    sceneTitle: "The Last Letter"
    wordCount: 400
    sceneOutline: '{"beat":"placeholder","hook":"placeholder"}'
    keyConstraints: "(discrimination case — see assertion)"
  assert:
    - type: llm-rubric
      value: >
        You are judging FAITHFULNESS of a writer passage to an architect plan.

        ARCHITECT PLAN: The scene must end TRAGICALLY — Elena reads the letter,
        learns her brother died at sea, and is left alone in grief. No rescue,
        no hopeful reversal.

        WRITER PASSAGE: "Elena unfolded the page with trembling hands — then
        laughed aloud. The letter was from her brother himself: the Maris had
        limped into port after all, and he would be home by Sunday. She threw open
        the window and called the good news down to the children in the lane."

        PASS if and only if the passage FAITHFULLY follows the plan. Here the
        passage CONTRADICTS the plan (brother survives, hopeful reversal), so the
        correct verdict is FAIL. Output PASS/FAIL with one sentence of reasoning.
      # NOTE: For this UNFAITHFUL case we EXPECT the judge to answer FAIL.
      # promptfoo records the rubric's PASS/FAIL; a discriminating judge yields
      # FAIL here and PASS on faithful-tragic-ending. The pair PASSES the gate
      # when the two verdicts DIFFER in the correct direction. See README for how
      # to read this (an expected-FAIL case showing red in the grid is correct).

# ---- PAIR B: plan forbids a character; writer obeys / violates --------------
- _id: faithful-no-villain
  vars:
    sceneNum: 2
    sceneTitle: "Empty House"
    wordCount: 350
    sceneOutline: '{"beat":"placeholder","hook":"placeholder"}'
    keyConstraints: "(discrimination case — see assertion)"
  assert:
    - type: llm-rubric
      value: >
        You are judging FAITHFULNESS of a writer passage to an architect plan.

        ARCHITECT PLAN: Tom searches the empty house ALONE. The antagonist
        (Crane) must NOT appear in this scene — his presence is felt only through
        signs (a cold cup of coffee, a door left ajar).

        WRITER PASSAGE: "Tom moved room to room. The coffee on the table was still
        warm; the back door stood open to the rain. Whoever had been here had left
        in a hurry. He never saw a soul — only the spaces a person leaves behind."

        PASS if and only if the passage FAITHFULLY follows the plan (Crane absent,
        presence implied only). Output PASS/FAIL with one sentence of reasoning.

- _id: unfaithful-no-villain
  vars:
    sceneNum: 2
    sceneTitle: "Empty House"
    wordCount: 350
    sceneOutline: '{"beat":"placeholder","hook":"placeholder"}'
    keyConstraints: "(discrimination case — see assertion)"
  assert:
    - type: llm-rubric
      value: >
        You are judging FAITHFULNESS of a writer passage to an architect plan.

        ARCHITECT PLAN: Tom searches the empty house ALONE. The antagonist
        (Crane) must NOT appear in this scene — his presence is felt only through
        signs (a cold cup of coffee, a door left ajar).

        WRITER PASSAGE: "Tom moved room to room. In the study, Crane was waiting in
        the leather chair, a pistol resting on his knee. 'I wondered when you'd get
        here,' Crane said, and gestured for Tom to sit."

        PASS if and only if the passage FAITHFULLY follows the plan. Here Crane
        APPEARS and SPEAKS, contradicting the plan, so the correct verdict is
        FAIL. Output PASS/FAIL with one sentence of reasoning.
      # EXPECTED: FAIL (discriminating judge). See faithful-no-villain for the pair.
